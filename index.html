<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영어 학습 도우미</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">

    <div class="max-w-md mx-auto bg-white rounded-3xl shadow-lg p-6">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-bold text-gray-800">영어 학습 도우미</h1>
            <button onclick="resetApp()" class="text-sm bg-gray-200 px-3 py-1 rounded-full text-gray-600 hover:bg-gray-300">처음으로</button>
        </div>

        <div id="inputSection" class="mb-6">
            <textarea id="scriptInput" class="w-full h-32 p-4 border rounded-2xl border-gray-200 focus:ring-2 focus:ring-blue-400 outline-none" placeholder="공부할 영어를 입력하세요..."></textarea>
            <button onclick="processText()" class="w-full mt-3 bg-blue-500 text-white py-3 rounded-2xl font-bold hover:bg-blue-600 transition">학습 시작</button>
        </div>

        <div id="studyMenu" class="hidden grid grid-cols-2 gap-3 mb-6">
            <button onclick="enterWordMode()" class="bg-indigo-100 text-indigo-700 p-3 rounded-xl font-bold hover:bg-indigo-200">단어 학습</button>
            <button id="listenButton" onclick="togglePlayback()" class="bg-green-100 text-green-700 p-3 rounded-xl font-bold hover:bg-green-200">전체 듣기</button>
            <button onclick="showTranslationMode()" class="bg-blue-100 text-blue-700 p-3 rounded-xl font-bold hover:bg-blue-200">해석</button>
            <button onclick="showGrammar()" class="bg-yellow-100 text-yellow-700 p-3 rounded-xl font-bold hover:bg-yellow-200">어법 설명</button>
            <button onclick="showWriting()" class="col-span-2 bg-purple-100 text-purple-700 p-3 rounded-xl font-bold hover:bg-purple-200">영작 연습</button>
        </div>

        <div id="displayArea" class="bg-gray-50 p-6 rounded-2xl min-h-[150px] leading-relaxed text-lg text-gray-700">
            텍스트를 입력하고 시작 버튼을 눌러주세요.
        </div>
    </div>

    <div id="globalModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl">
            <div id="modalContent"></div>
            <button onclick="closeModal()" class="w-full mt-6 bg-gray-100 py-3 rounded-xl font-semibold hover:bg-gray-200">닫기</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
