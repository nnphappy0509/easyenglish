<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영어 학습 도우미</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>영어 학습 도우미</h1>
            <button id="btn-home" class="btn-home">처음으로</button>
        </header>

        <nav class="menu-grid">
            <button id="btn-word" class="btn-menu btn-blue">단어 학습</button>
            <button id="btn-listen" class="btn-menu btn-green">전체 듣기</button>
            <button id="btn-translate" class="btn-menu btn-blue-light">해석</button>
            <button id="btn-grammar" class="btn-menu btn-yellow">어법 설명</button>
            <button id="btn-write" class="btn-menu btn-purple" style="grid-column: span 2;">영작 연습</button>
        </nav>

        <main id="content-area">
            <p class="instruction" id="instruction-text">메뉴를 선택하여 학습을 시작하세요.</p>
            <div id="text-container">
                </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
