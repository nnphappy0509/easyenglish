<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영어 학습 도우미</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>영어 학습 도우미</h1>
            <button id="btn-home" class="btn-home">처음으로</button>
        </header>

        <main id="content-area">
            <div id="input-section">
                <textarea id="user-input" placeholder="공부할 영어 스크립트를 이곳에 붙여넣으세요..."></textarea>
                <button id="btn-start" class="btn-start">학습 시작</button>
                <p class="instruction">텍스트를 입력하고 시작 버튼을 눌러주세요.</p>
            </div>

            <div id="learning-section" style="display: none;">
                <nav class="menu-grid">
                    <button id="btn-word" class="btn-menu btn-blue">단어 학습</button>
                    <button id="btn-listen" class="btn-menu btn-green">전체 듣기</button>
                    <button id="btn-translate" class="btn-menu btn-blue-light">해석</button>
                    <button id="btn-grammar" class="btn-menu btn-yellow">어법 설명</button>
                    <button id="btn-write" class="btn-menu btn-purple" style="grid-column: span 2;">영작 연습</button>
                </nav>
                <p class="instruction" id="instruction-text">메뉴를 선택하여 학습을 시작하세요.</p>
                
                <div id="text-container"></div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
